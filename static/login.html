<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Servit - Sign In</title>
<meta name="theme-color" content="#0d1117">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  background: #0d1117;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Helvetica, Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 24px;
  padding-top: max(24px, env(safe-area-inset-top));
  padding-bottom: max(24px, env(safe-area-inset-bottom));
  -webkit-font-smoothing: antialiased;
}

.login-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 16px;
  padding: 40px 32px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
}

.login-icon {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
}
.login-icon svg {
  width: 48px;
  height: 48px;
  color: #58a6ff;
}

h1 {
  font-size: 22px;
  text-align: center;
  margin-bottom: 4px;
  color: #e6edf3;
  font-weight: 700;
}

.subtitle {
  font-size: 14px;
  text-align: center;
  color: #8b949e;
  margin-bottom: 28px;
}

.field {
  margin-bottom: 16px;
}

label {
  display: block;
  font-size: 13px;
  color: #8b949e;
  margin-bottom: 6px;
  font-weight: 600;
}

input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #30363d;
  border-radius: 8px;
  background: #0d1117;
  color: #e6edf3;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  min-height: 48px;
}
input:focus {
  border-color: #58a6ff;
  box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
}
input::placeholder { color: #484f58; }

button[type="submit"] {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #238636;
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
  -webkit-tap-highlight-color: transparent;
  min-height: 48px;
}
button[type="submit"]:hover { background: #2ea043; }
button[type="submit"]:active { background: #196c2e; }
button[type="submit"]:disabled {
  background: #21262d;
  color: #484f58;
  cursor: not-allowed;
}

.error {
  color: #f85149;
  font-size: 13px;
  text-align: center;
  margin-top: 16px;
  display: none;
  background: rgba(248, 81, 73, 0.1);
  border: 1px solid rgba(248, 81, 73, 0.2);
  border-radius: 8px;
  padding: 10px 14px;
  line-height: 1.4;
}

.footer {
  color: #30363d;
  font-size: 11px;
  text-align: center;
  margin-top: 20px;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="3" width="20" height="18" rx="2"/>
      <polyline points="6 9 10 13 6 17"/>
      <line x1="12" y1="17" x2="18" y2="17"/>
    </svg>
  </div>
  <h1>Servit</h1>
  <div class="subtitle">서버에 로그인하세요</div>
  <form id="form">
    <div class="field">
      <label for="username">사용자 이름</label>
      <input type="text" id="username" placeholder="username" autofocus autocomplete="username">
    </div>
    <div class="field">
      <label for="pw">비밀번호</label>
      <input type="password" id="pw" placeholder="password" autocomplete="current-password">
    </div>
    <button type="submit" id="submit-btn">로그인</button>
  </form>
  <div class="error" id="err"></div>
  <div class="footer">SERVIT TERMINAL</div>
</div>
<script>
(function() {
  const form = document.getElementById('form');
  const errEl = document.getElementById('err');
  const submitBtn = document.getElementById('submit-btn');

  form.onsubmit = async (e) => {
    e.preventDefault();
    errEl.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const pw = document.getElementById('pw').value;

    if (!username) {
      errEl.textContent = '사용자 이름을 입력하세요';
      errEl.style.display = 'block';
      return;
    }
    if (!pw) {
      errEl.textContent = '비밀번호를 입력하세요';
      errEl.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '로그인 중...';

    try {
      const res = await fetch('/api/login', {
        method: 'GET',
        headers: {
          'Authorization': 'Basic ' + btoa(username + ':' + pw)
        }
      });
      const data = await res.json();

      if (data.ok) {
        window.location.href = '/';
      } else {
        errEl.textContent = data.error || '사용자 이름 또는 비밀번호가 올바르지 않습니다';
        errEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = '로그인';
      }
    } catch (err) {
      errEl.textContent = '연결 실패 -- 서버 상태를 확인하세요';
      errEl.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = '로그인';
    }
  };
})();
</script>
</body>
</html>
